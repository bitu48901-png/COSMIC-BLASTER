<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 Live Chat App</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}
.chat-container {
    width: 95%;
    max-width: 450px;
    height: 95vh;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
}
.avatar {
    width: 45px;
    height: 45px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
}
.header-info h2 { font-size: 18px; }
.header-info p { font-size: 12px; opacity: 0.9; }
.online-dot {
    width: 10px;
    height: 10px;
    background: #4CAF50;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

.login-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 30px;
    background: #f5f5f5;
}
.login-screen h3 { color: #333; margin-bottom: 10px; }
.login-screen p { color: #666; margin-bottom: 25px; text-align: center; font-size: 14px; }
.login-screen input {
    width: 100%;
    padding: 15px;
    border: 2px solid #ddd;
    border-radius: 10px;
    font-size: 16px;
    margin-bottom: 15px;
    outline: none;
}
.login-screen input:focus { border-color: #667eea; }
.btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s;
}
.btn:hover { transform: scale(1.02); }
.room-code {
    background: #e3f2fd;
    padding: 10px;
    border-radius: 8px;
    margin-top: 15px;
    font-size: 13px;
    color: #1976d2;
    text-align: center;
}

.messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    background: #ECE5DD;
    background-image: 
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1) 0%, transparent 50%);
}
.message {
    margin-bottom: 10px;
    max-width: 80%;
    padding: 8px 12px;
    border-radius: 12px;
    word-wrap: break-word;
    animation: slideIn 0.3s ease;
    position: relative;
}
@keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.message.sent {
    background: #DCF8C6;
    margin-left: auto;
    border-bottom-right-radius: 3px;
}
.message.received {
    background: white;
    border-bottom-left-radius: 3px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}
.message.system {
    background: rgba(255,235,59,0.3);
    margin: 10px auto;
    text-align: center;
    font-size: 12px;
    color: #666;
    max-width: 90%;
    padding: 6px 12px;
    border-radius: 10px;
}
.message .user {
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 3px;
    color: #667eea;
}
.message .text { font-size: 14px; color: #333; }
.message .time {
    font-size: 10px;
    color: #999;
    margin-top: 3px;
    text-align: right;
}

.input-area {
    display: flex;
    padding: 10px;
    background: #f0f0f0;
    gap: 8px;
}
.input-area input {
    flex: 1;
    padding: 12px 15px;
    border: none;
    border-radius: 25px;
    font-size: 15px;
    outline: none;
    background: white;
}
.send-btn {
    width: 45px;
    height: 45px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.hidden { display: none !important; }

.menu-btn {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
}
.users-list {
    background: #f9f9f9;
    padding: 8px 15px;
    font-size: 12px;
    color: #666;
    border-bottom: 1px solid #eee;
}
#shareCode {
    background: #fff3cd;
    padding: 8px;
    text-align: center;
    font-size: 12px;
    color: #856404;
    border-bottom: 1px solid #ffeaa7;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="chat-container">
    
    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div style="font-size:60px; margin-bottom:20px;">💬</div>
        <h3>Welcome to Live Chat</h3>
        <p>Apna naam aur room code daalo. Same room code wale log baat kar sakte hain!</p>
        <input type="text" id="usernameInput" placeholder="Your name..." maxlength="20">
        <input type="text" id="roomInput" placeholder="Room code (e.g., friends123)" maxlength="20">
        <button class="btn" onclick="joinChat()">🚀 Join Chat</button>
        <div class="room-code">
            💡 Friends ko same "room code" batao, sab ek saath chat kar sakte hain!
        </div>
    </div>
    
    <!-- CHAT SCREEN -->
    <div id="chatScreen" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="header">
            <div class="avatar">💬</div>
            <div class="header-info">
                <h2 id="roomName">Room</h2>
                <p><span class="online-dot"></span><span id="onlineCount">0 online</span></p>
            </div>
            <button class="menu-btn" onclick="leaveChat()">Exit</button>
        </div>
        
        <div id="shareCode" onclick="copyRoomCode()">📋 Tap to copy room code & share with friends</div>
        
        <div class="messages" id="messages"></div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
// =========================================
// LIVE CHAT USING FREE PUBLIC BACKEND
// No setup needed! Works instantly!
// =========================================

let username = '';
let roomCode = '';
let lastMessageId = 0;
let pollInterval = null;

// Using JSONBin.io free API (no signup needed with public bins)
// Alternative: using a simple approach with BroadcastChannel for same-device
// and localStorage polling for cross-tab

// For TRUE online chat, we use a free service
const API_BASE = 'https://api.jsonbin.io/v3/b';

function joinChat() {
    const nameInput = document.getElementById('usernameInput');
    const roomInputEl = document.getElementById('roomInput');
    
    if (nameInput.value.trim() === '') {
        alert('Please enter your name!');
        return;
    }
    if (roomInputEl.value.trim() === '') {
        alert('Please enter a room code!');
        return;
    }
    
    username = nameInput.value.trim();
    roomCode = roomInputEl.value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
    
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('chatScreen').classList.remove('hidden');
    document.getElementById('chatScreen').style.display = 'flex';
    document.getElementById('roomName').textContent = 'Room: ' + roomCode;
    
    // Show system message
    addSystemMessage(`You joined as ${username}`);
    
    // Start chat
    initChat();
}

function initChat() {
    // Load existing messages from localStorage for this room
    loadMessages();
    
    // Listen for new messages via BroadcastChannel (same device)
    if (typeof BroadcastChannel !== 'undefined') {
        window.chatChannel = new BroadcastChannel('chat_' + roomCode);
        window.chatChannel.onmessage = (e) => {
            if (e.data.type === 'message') {
                displayMessage(e.data.message, false);
                saveMessage(e.data.message);
            } else if (e.data.type === 'join') {
                addSystemMessage(`${e.data.user} joined the chat`);
            }
        };
        
        // Announce join
        window.chatChannel.postMessage({ type: 'join', user: username });
    }
    
    // Listen for storage events (cross-tab)
    window.addEventListener('storage', (e) => {
        if (e.key === 'chat_' + roomCode && e.newValue) {
            const data = JSON.parse(e.newValue);
            if (data.id !== lastMessageId && data.user !== username) {
                displayMessage(data, false);
                lastMessageId = data.id;
            }
        }
    });
    
    // For ONLINE chat across devices - use public API
    startOnlinePolling();
}

// ============================================
// ONLINE CHAT USING FREE PUBLIC API (npoint.io)
// ============================================
async function startOnlinePolling() {
    // We'll use a simple REST endpoint pattern
    // Using textdb.online as free no-auth backend
    
    const pollUrl = `https://textdb.online/chat_room_${roomCode}`;
    
    // Poll for new messages every 2 seconds
    pollInterval = setInterval(async () => {
        try {
            const response = await fetch(pollUrl + '?t=' + Date.now(), {
                cache: 'no-cache'
            });
            if (response.ok) {
                const text = await response.text();
                if (text && text.trim()) {
                    try {
                        const messages = JSON.parse(text);
                        if (Array.isArray(messages)) {
                            messages.forEach(msg => {
                                if (msg.id > lastMessageId && msg.user !== username) {
                                    displayMessage(msg, false);
                                    lastMessageId = Math.max(lastMessageId, msg.id);
                                }
                            });
                        }
                    } catch(e) {}
                }
            }
        } catch (err) {
            // Silently fail - offline mode still works via BroadcastChannel
        }
    }, 2000);
}

async function sendToServer(message) {
    try {
        // Get existing messages
        const getUrl = `https://textdb.online/chat_room_${roomCode}`;
        let messages = [];
        try {
            const res = await fetch(getUrl + '?t=' + Date.now(), { cache: 'no-cache' });
            if (res.ok) {
                const text = await res.text();
                if (text) messages = JSON.parse(text) || [];
            }
        } catch(e) { messages = []; }
        
        // Add new message
        messages.push(message);
        // Keep only last 50 messages
        if (messages.length > 50) messages = messages.slice(-50);
        
        // Save back
        await fetch(`https://textdb.online/chat_room_${roomCode}`, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(messages)
        });
    } catch (err) {
        console.log('Online sync failed, using local only');
    }
}

function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (text === '') return;
    
    const message = {
        id: Date.now(),
        user: username,
        text: text,
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
        timestamp: Date.now()
    };
    
    lastMessageId = message.id;
    
    // Display locally
    displayMessage(message, true);
    saveMessage(message);
    
    // Broadcast to other tabs on same device
    if (window.chatChannel) {
        window.chatChannel.postMessage({ type: 'message', message: message });
    }
    
    // Send to server for cross-device chat
    sendToServer(message);
    
    input.value = '';
}

function displayMessage(msg, isSent) {
    const messagesDiv = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + (isSent ? 'sent' : 'received');
    div.innerHTML = `
        ${!isSent ? `<div class="user">${escapeHTML(msg.user)}</div>` : ''}
        <div class="text">${escapeHTML(msg.text)}</div>
        <div class="time">${msg.time}</div>
    `;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addSystemMessage(text) {
    const messagesDiv = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message system';
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function saveMessage(msg) {
    try {
        const key = 'chatHistory_' + roomCode;
        let history = JSON.parse(localStorage.getItem(key) || '[]');
        history.push(msg);
        if (history.length > 100) history = history.slice(-100);
        localStorage.setItem(key, JSON.stringify(history));
        localStorage.setItem('chat_' + roomCode, JSON.stringify(msg));
    } catch(e) {}
}

function loadMessages() {
    try {
        const key = 'chatHistory_' + roomCode;
        const history = JSON.parse(localStorage.getItem(key) || '[]');
        history.forEach(msg => {
            displayMessage(msg, msg.user === username);
            lastMessageId = Math.max(lastMessageId, msg.id || 0);
        });
    } catch(e) {}
}

function leaveChat() {
    if (confirm('Exit chat?')) {
        if (pollInterval) clearInterval(pollInterval);
        if (window.chatChannel) window.chatChannel.close();
        location.reload();
    }
}

function copyRoomCode() {
    const shareText = `Join my chat! Open this link and use room code: ${roomCode}`;
    if (navigator.clipboard) {
        navigator.clipboard.writeText(roomCode);
        alert('✅ Room code copied: ' + roomCode + '\n\nFriends ko bhejo, same code daal ke join karenge!');
    } else {
        prompt('Room code (copy this):', roomCode);
    }
}

function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}
</script>

</body>
</html>
