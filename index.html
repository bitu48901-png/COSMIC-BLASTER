<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>COSMIC BLASTER</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'Courier New',monospace;
  overflow:hidden;
}
#wrap {
  position:relative;
  width:480px;
  height:640px;
}
canvas {
  display:block;
  border:1px solid rgba(0,255,255,0.2);
  box-shadow:0 0 40px rgba(0,255,255,0.1);
}
#hud {
  position:absolute;
  top:0; left:0; right:0;
  display:flex;
  justify-content:space-between;
  padding:10px 16px;
  color:#0ff;
  font-size:13px;
  letter-spacing:2px;
  pointer-events:none;
  z-index:10;
}
#lives { color:#ff4466; }
#overlay {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,8,0.92);
  color:#fff;
  text-align:center;
  z-index:20;
  gap:16px;
}
#overlay h1 {
  font-size:46px;
  letter-spacing:8px;
  color:#0ff;
  text-shadow:0 0 20px #0ff;
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
#overlay .sub { font-size:13px; color:#666; letter-spacing:3px; }
#overlay .sc { font-size:30px; color:#ff0; letter-spacing:4px; }
#overlay .hi { font-size:12px; color:#555; letter-spacing:2px; }
#playBtn {
  padding:13px 50px;
  background:transparent;
  border:1.5px solid #0ff;
  color:#0ff;
  font-family:'Courier New',monospace;
  font-size:15px;
  letter-spacing:4px;
  cursor:pointer;
  text-transform:uppercase;
  transition:all 0.2s;
}
#playBtn:hover { background:rgba(0,255,255,0.1); box-shadow:0 0 20px rgba(0,255,255,0.4); }
#banner {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:26px;
  letter-spacing:5px;
  color:#ff0;
  text-shadow:0 0 12px #ff0;
  pointer-events:none;
  z-index:15;
  opacity:0;
  transition:opacity 0.4s;
  white-space:nowrap;
}
#tip {
  position:absolute;
  bottom:8px; left:0; right:0;
  text-align:center;
  font-size:11px;
  color:rgba(255,255,255,0.2);
  pointer-events:none;
  letter-spacing:1px;
}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>SCORE: <b id="sc">0</b></span>
    <span>LVL <b id="lv">1</b></span>
    <span id="lives">♥ ♥ ♥</span>
  </div>
  <canvas id="c" width="480" height="640"></canvas>
  <div id="banner"></div>
  <div id="overlay">
    <h1>COSMIC<br>BLASTER</h1>
    <div class="sub">DESTROY ALL ALIENS</div>
    <button id="playBtn">▶ PLAY</button>
    <div class="sub" style="font-size:11px;margin-top:4px">← → MOVE &nbsp;|&nbsp; SPACE SHOOT</div>
  </div>
  <div id="tip">← → MOVE &nbsp;|&nbsp; SPACE SHOOT &nbsp;|&nbsp; P PAUSE</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 640;

// HUD elements
const scEl = document.getElementById('sc');
const lvEl = document.getElementById('lv');
const livesEl = document.getElementById('lives');
const overlay = document.getElementById('overlay');
const playBtn = document.getElementById('playBtn');
const banner = document.getElementById('banner');

// Game state
let state = 'menu'; // menu, playing, paused, dead
let score = 0, hiScore = 0, lives = 3, level = 1;
let raf = null;
let lastTs = 0;

// Input
const keys = {};
document.addEventListener('keydown', e => {
  if (e.key === ' ') e.preventDefault();
  keys[e.key] = true;

  if (e.key === 'p' || e.key === 'P') {
    if (state === 'playing') {
      state = 'paused';
    } else if (state === 'paused') {
      state = 'playing';
      lastTs = performance.now(); // reset time to avoid jump
    }
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ---- STARS ----
const stars = [];
for (let i = 0; i < 140; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.5 + 0.2,
    s: Math.random() * 1.2 + 0.3,
    a: Math.random() * 0.7 + 0.2
  });
}
function updateStars(dt) {
  for (const s of stars) {
    s.y += s.s * dt * 0.06;
    if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
  }
}
function drawStars() {
  for (const s of stars) {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---- PLAYER ----
let px, py, pVx;
let shootCD = 0;
let shield = 0, multiShot = 0, invincible = 0;
let pSpeed = 320;
let trail = [];

function initPlayer() {
  px = W / 2; py = H - 70; pVx = 0;
  shield = 0; multiShot = 0; invincible = 0;
  pSpeed = 320; trail = [];
}

function updatePlayer(dt) {
  const s = pSpeed * dt / 1000;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) px -= s;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) px += s;
  px = Math.max(24, Math.min(W - 24, px));
  if (shield > 0) shield -= dt;
  if (multiShot > 0) multiShot -= dt;
  if (invincible > 0) invincible -= dt;
  trail.unshift({ x: px, y: py + 18 });
  if (trail.length > 10) trail.pop();
}

function drawPlayer() {
  if (invincible > 0 && Math.floor(Date.now() / 70) % 2 === 0) return;
  const x = px, y = py;

  // Trail
  for (let i = 0; i < trail.length; i++) {
    ctx.globalAlpha = (1 - i / trail.length) * 0.18;
    ctx.fillStyle = '#0ff';
    ctx.beginPath();
    ctx.ellipse(trail[i].x, trail[i].y, 5, 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Flame
  const fl = 0.85 + Math.random() * 0.3;
  const fg = ctx.createLinearGradient(x, y + 22, x, y + 22 + 24 * fl);
  fg.addColorStop(0, '#0ff');
  fg.addColorStop(0.5, '#0060ff');
  fg.addColorStop(1, 'transparent');
  ctx.fillStyle = fg;
  ctx.beginPath();
  ctx.moveTo(x - 9, y + 22);
  ctx.lineTo(x + 9, y + 22);
  ctx.lineTo(x, y + 22 + 22 * fl);
  ctx.closePath();
  ctx.fill();

  // Ship body
  ctx.fillStyle = '#0d1e3a';
  ctx.beginPath();
  ctx.moveTo(x, y - 22);
  ctx.lineTo(x + 22, y + 22);
  ctx.lineTo(x + 8, y + 14);
  ctx.lineTo(x, y + 18);
  ctx.lineTo(x - 8, y + 14);
  ctx.lineTo(x - 22, y + 22);
  ctx.closePath();
  ctx.fill();

  // Glow edge
  ctx.strokeStyle = 'rgba(0,200,255,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y - 22);
  ctx.lineTo(x + 22, y + 22);
  ctx.lineTo(x - 22, y + 22);
  ctx.closePath();
  ctx.stroke();

  // Cockpit
  const cg = ctx.createRadialGradient(x, y - 8, 1, x, y - 8, 8);
  cg.addColorStop(0, '#fff');
  cg.addColorStop(0.4, '#0ff');
  cg.addColorStop(1, 'rgba(0,200,255,0)');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.ellipse(x, y - 8, 8, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Shield ring
  if (shield > 0) {
    ctx.strokeStyle = `rgba(0,255,255,${0.35 + 0.25 * Math.sin(Date.now() * 0.01)})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 34, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.lineWidth = 1;
}

// ---- BULLETS ----
let bullets = [];
function shootPlayer() {
  if (multiShot > 0) {
    bullets.push({ x: px - 12, y: py - 18, vx: -50, vy: -600, alive: true });
    bullets.push({ x: px,      y: py - 22, vx:   0, vy: -620, alive: true });
    bullets.push({ x: px + 12, y: py - 18, vx:  50, vy: -600, alive: true });
  } else {
    bullets.push({ x: px, y: py - 22, vx: 0, vy: -620, alive: true });
  }
}
function updateBullets(dt) {
  const t = dt / 1000;
  for (const b of bullets) {
    b.x += b.vx * t;
    b.y += b.vy * t;
    if (b.y < -20 || b.x < -10 || b.x > W + 10) b.alive = false;
  }
  bullets = bullets.filter(b => b.alive);
}
function drawBullets() {
  for (const b of bullets) {
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#0ff';
    ctx.fillStyle = '#80ffff';
    ctx.beginPath();
    ctx.roundRect(b.x - 2, b.y - 8, 4, 16, 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

// ---- ENEMY BULLETS ----
let eBullets = [];
function updateEBullets(dt) {
  const t = dt / 1000;
  for (const b of eBullets) {
    b.x += b.vx * t;
    b.y += b.vy * t;
    if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) b.alive = false;
  }
  eBullets = eBullets.filter(b => b.alive);
}
function drawEBullets() {
  for (const b of eBullets) {
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#f40';
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

// ---- ENEMIES ----
let enemies = [];
let bossAlive = false;
let spawnTimer = 0;
let killCount = 0;

function makeEnemy(type, x, y) {
  const cfg = {
    basic: { hp:1, maxHp:1, w:32, h:28, spd:55, sc:10, col:'#ff4466', shT:2200 },
    fast:  { hp:1, maxHp:1, w:26, h:22, spd:95, sc:20, col:'#ff9900', shT:1600 },
    tank:  { hp:3, maxHp:3, w:44, h:38, spd:38, sc:50, col:'#aa44ff', shT:2800 },
    boss:  { hp:30+level*8, maxHp:30+level*8, w:82, h:68, spd:45, sc:600, col:'#ff0066', shT:700 }
  }[type];
  return {
    type, x, y, alive: true,
    hp: cfg.hp, maxHp: cfg.maxHp,
    w: cfg.w, h: cfg.h,
    spd: cfg.spd + level * 5,
    sc: cfg.sc, col: cfg.col,
    shootTimer: cfg.shT + Math.random() * 1000,
    dir: Math.random() > 0.5 ? 1 : -1,
    zTimer: 0, bDir: 1,
    t: 0
  };
}

function updateEnemies(dt) {
  const t = dt / 1000;
  for (const e of enemies) {
    if (!e.alive) continue;
    e.t += dt;
    const s = e.spd * t;

    if (e.type === 'boss') {
      e.x += e.bDir * s * 0.9;
      e.y += Math.sin(e.t * 0.001) * 0.4;
      if (e.y < 80) e.y += s * 0.3;
      if (e.x > W - e.w / 2 - 10) e.bDir = -1;
      if (e.x < e.w / 2 + 10) e.bDir = 1;
    } else if (e.type === 'fast') {
      e.zTimer += dt;
      if (e.zTimer > 500) { e.dir *= -1; e.zTimer = 0; }
      e.x += e.dir * s * 1.8;
      e.y += s * 0.65;
      e.x = Math.max(e.w/2, Math.min(W - e.w/2, e.x));
    } else {
      e.y += s;
    }

    if (e.y > H + 60) { e.alive = false; continue; }

    e.shootTimer -= dt;
    if (e.shootTimer <= 0) {
      enemyShoot(e);
      e.shootTimer = e.type === 'boss' ? 550 : 2000 + Math.random() * 1500;
    }
  }
  enemies = enemies.filter(e => e.alive);
}

function enemyShoot(e) {
  const dx = px - e.x, dy = py - e.y;
  const dist = Math.sqrt(dx * dx + dy * dy) || 1;
  const spd = 180 + level * 18;
  const count = e.type === 'boss' ? 3 : 1;
  for (let i = 0; i < count; i++) {
    const spread = count > 1 ? (i - 1) * 0.3 : 0;
    eBullets.push({
      x: e.x, y: e.y + e.h / 2,
      vx: (dx / dist + spread) * spd,
      vy: (dy / dist) * spd,
      alive: true
    });
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    const { x, y, w, h, col, type, hp, maxHp, t } = e;
    ctx.save();
    ctx.translate(x, y);

    if (type === 'boss') {
      // Boss body
      const pulse = 0.92 + 0.08 * Math.sin(t * 0.005);
      ctx.fillStyle = '#1a0018';
      ctx.beginPath();
      ctx.ellipse(0, 0, w/2, h/2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = col;
      ctx.lineWidth = 2.5;
      ctx.globalAlpha = pulse;
      ctx.stroke();
      ctx.globalAlpha = 1;

      // Inner ring
      ctx.strokeStyle = col + '66';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(0, 0, w/2 - 10, h/2 - 8, 0, 0, Math.PI * 2);
      ctx.stroke();

      // Eye
      const eg = ctx.createRadialGradient(0, 0, 2, 0, 0, 12);
      eg.addColorStop(0, '#fff');
      eg.addColorStop(0.4, '#ff0');
      eg.addColorStop(1, '#f00');
      ctx.fillStyle = eg;
      ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();

      // Cannons
      for (let i = -1; i <= 1; i++) {
        ctx.fillStyle = '#222';
        ctx.fillRect(i * 30 - 5, h/2 - 6, 10, 20);
        ctx.fillStyle = col;
        ctx.fillRect(i * 30 - 3, h/2 + 10, 6, 6);
      }

      // HP bar
      ctx.fillStyle = '#300';
      ctx.fillRect(-w/2, -h/2 - 16, w, 7);
      const ratio = hp / maxHp;
      ctx.fillStyle = `hsl(${ratio * 120}, 100%, 45%)`;
      ctx.fillRect(-w/2, -h/2 - 16, w * ratio, 7);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(-w/2, -h/2 - 16, w, 7);

    } else {
      // Normal enemy body
      ctx.fillStyle = col + '28';
      ctx.strokeStyle = col;
      ctx.lineWidth = 1.5;

      if (type === 'tank') {
        ctx.beginPath();
        ctx.moveTo(0, h/2);
        ctx.lineTo(-w/2, -h/4);
        ctx.lineTo(-w/4, -h/2);
        ctx.lineTo(w/4, -h/2);
        ctx.lineTo(w/2, -h/4);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        // Extra armor lines
        ctx.strokeStyle = col + '55';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(-w/3, 0); ctx.lineTo(w/3, 0);
        ctx.stroke();
        // HP bar
        if (hp < maxHp) {
          ctx.fillStyle = '#300'; ctx.fillRect(-w/2, -h/2 - 8, w, 4);
          ctx.fillStyle = '#0f0'; ctx.fillRect(-w/2, -h/2 - 8, w*(hp/maxHp), 4);
        }
      } else {
        ctx.beginPath();
        ctx.moveTo(0, -h/2);
        ctx.lineTo(w/2, h/3);
        ctx.lineTo(w/4, h/2);
        ctx.lineTo(-w/4, h/2);
        ctx.lineTo(-w/2, h/3);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
      }

      // Eye
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(1, 0, 2.5, 0, Math.PI*2); ctx.fill();
    }

    ctx.restore();
  }
}

function hitEnemy(e, dmg) {
  e.hp -= dmg;
  spawnParticles(e.x, e.y, e.col, 6);
  if (e.hp <= 0) {
    e.alive = false;
    score += e.sc;
    killCount++;
    scEl.textContent = score;
    spawnParticles(e.x, e.y, e.col, e.type === 'boss' ? 35 : 14);
    if (e.type === 'boss') bossAlive = false;
    if (Math.random() < 0.2) spawnPowerup(e.x, e.y);
  }
}

// ---- PARTICLES ----
let particles = [];
function spawnParticles(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = Math.random() * 140 + 40;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: 1,
      decay: 0.6 + Math.random() * 0.9,
      r: Math.random() * 4 + 1.5,
      col
    });
  }
}
function updateParticles(dt) {
  const t = dt / 1000;
  for (const p of particles) {
    p.x += p.vx * t;
    p.y += p.vy * t;
    p.vy += 50 * t;
    p.life -= p.decay * t;
  }
  particles = particles.filter(p => p.life > 0);
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---- POWERUPS ----
let powerups = [];
const PW = { shield:'#0ff', multi:'#ff0', life:'#f55', speed:'#0f0' };
const PL = { shield:'S', multi:'M', life:'♥', speed:'F' };
function spawnPowerup(x, y) {
  const types = ['shield','multi','life','speed'];
  const type = types[Math.floor(Math.random() * 4)];
  powerups.push({ x, y, type, alive: true, t: 0 });
}
function updatePowerups(dt) {
  for (const p of powerups) {
    p.y += 70 * dt / 1000;
    p.t += dt;
    if (p.y > H + 40) p.alive = false;
  }
  powerups = powerups.filter(p => p.alive);
}
function drawPowerups() {
  for (const p of powerups) {
    const pulse = 0.85 + 0.15 * Math.sin(p.t * 0.006);
    const c = PW[p.type];
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = c + '22';
    ctx.strokeStyle = c;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = c;
    ctx.font = 'bold 13px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(PL[p.type], 0, 0);
    ctx.restore();
  }
}
function collectPowerup(p) {
  p.alive = false;
  spawnParticles(p.x, p.y, PW[p.type], 10);
  if (p.type === 'shield') shield = 6000;
  else if (p.type === 'multi') multiShot = 7000;
  else if (p.type === 'life') { lives = Math.min(5, lives + 1); updateLivesUI(); }
  else if (p.type === 'speed') {
    pSpeed = 480;
    setTimeout(() => { pSpeed = 320; }, 5000);
  }
}

// ---- COLLISIONS ----
function checkCollisions() {
  // Player bullets vs enemies
  for (const b of bullets) {
    if (!b.alive) continue;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (Math.abs(b.x - e.x) < e.w/2 + 3 && Math.abs(b.y - e.y) < e.h/2 + 3) {
        b.alive = false;
        hitEnemy(e, 1);
        break;
      }
    }
  }

  if (invincible > 0) return;

  // Enemy bullets vs player
  for (const b of eBullets) {
    if (!b.alive) continue;
    if (Math.abs(b.x - px) < 18 && Math.abs(b.y - py) < 20) {
      b.alive = false;
      if (shield > 0) {
        shield = 0;
        spawnParticles(px, py, '#0ff', 12);
      } else {
        onPlayerHit();
      }
    }
  }

  // Enemies vs player (direct collision)
  for (const e of enemies) {
    if (!e.alive) continue;
    if (Math.abs(e.x - px) < (e.w/2 + 16) && Math.abs(e.y - py) < (e.h/2 + 16)) {
      e.hp = 0;
      hitEnemy(e, 999);
      if (shield > 0) {
        shield = 0;
        spawnParticles(px, py, '#0ff', 12);
      } else {
        onPlayerHit();
      }
    }
  }

  // Powerups vs player
  for (const p of powerups) {
    if (!p.alive) continue;
    if (Math.abs(p.x - px) < 26 && Math.abs(p.y - py) < 26) {
      collectPowerup(p);
    }
  }
}

function onPlayerHit() {
  lives--;
  updateLivesUI();
  spawnParticles(px, py, '#ff4466', 22);
  if (lives <= 0) {
    state = 'dead';
    showGameOver();
  } else {
    invincible = 2800;
  }
}

function updateLivesUI() {
  livesEl.textContent = '♥ '.repeat(Math.max(0, lives)).trim();
}

// ---- LEVEL ----
function checkLevel() {
  if (bossAlive) return;
  if (killCount >= level * 12 && enemies.length === 0) {
    level++;
    killCount = 0;
    lvEl.textContent = level;
    showBanner(level % 3 === 0 ? `⚠ BOSS INCOMING ⚠` : `LEVEL ${level}`);
    if (level % 3 === 0) {
      setTimeout(() => {
        if (state === 'playing') {
          bossAlive = true;
          enemies.push(makeEnemy('boss', W/2, -90));
        }
      }, 2200);
    }
  }
}

function showBanner(txt) {
  banner.textContent = txt;
  banner.style.opacity = '1';
  clearTimeout(banner._t);
  banner._t = setTimeout(() => { banner.style.opacity = '0'; }, 2200);
}

// ---- SPAWN ----
function trySpawn(dt) {
  if (bossAlive) return;
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    const interval = Math.max(550, 1500 - level * 70);
    spawnTimer = interval;
    if (enemies.length >= 20) return;
    const r = Math.random();
    let type = r < 0.5 ? 'basic' : r < 0.78 ? 'fast' : 'tank';
    const x = 40 + Math.random() * (W - 80);
    enemies.push(makeEnemy(type, x, -40));
  }
}

// ---- GAME OVER / OVERLAY ----
function showGameOver() {
  if (score > hiScore) hiScore = score;
  overlay.innerHTML = `
    <h1>GAME<br>OVER</h1>
    <div class="sc">SCORE: ${score}</div>
    <div class="hi">BEST: ${hiScore}</div>
    <div class="sub">LEVEL ${level} REACHED</div>
    <button id="playBtn" onclick="startGame()">▶ PLAY AGAIN</button>
    <div class="sub" style="font-size:11px;margin-top:4px">← → MOVE &nbsp;|&nbsp; SPACE SHOOT</div>
  `;
  overlay.style.display = 'flex';
}

// ---- DRAW PAUSE SCREEN ----
function drawPause() {
  ctx.fillStyle = 'rgba(0,0,10,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 32px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowBlur = 16;
  ctx.shadowColor = '#0ff';
  ctx.fillText('PAUSED', W/2, H/2 - 16);
  ctx.shadowBlur = 0;
  ctx.font = '14px Courier New';
  ctx.fillStyle = '#666';
  ctx.fillText('Press P to continue', W/2, H/2 + 22);
}

// ---- INIT GAME ----
function startGame() {
  score = 0; lives = 3; level = 1; killCount = 0;
  bullets = []; eBullets = []; enemies = []; particles = []; powerups = [];
  bossAlive = false; spawnTimer = 0; shootCD = 0;
  initPlayer();
  scEl.textContent = 0;
  lvEl.textContent = 1;
  updateLivesUI();
  overlay.style.display = 'none';
  state = 'playing';
  lastTs = performance.now();
  if (raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(loop);
}

// ---- MAIN LOOP ----
function loop(ts) {
  raf = requestAnimationFrame(loop);
  const dt = Math.min(ts - lastTs, 50); // cap at 50ms (prevents huge jumps)
  lastTs = ts;

  // Always draw background + stars (even when paused — looks alive)
  ctx.fillStyle = '#000008';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  if (state === 'playing') {
    updateStars(dt);
    updatePlayer(dt);
    updateBullets(dt);
    updateEBullets(dt);
    updateEnemies(dt);
    updateParticles(dt);
    updatePowerups(dt);

    // Shooting input
    shootCD -= dt;
    if ((keys[' '] || keys['Space']) && shootCD <= 0) {
      shootPlayer();
      shootCD = multiShot > 0 ? 150 : 230;
    }

    checkCollisions();
    trySpawn(dt);
    checkLevel();

    drawPowerups();
    drawEBullets();
    drawEnemies();
    drawBullets();
    drawParticles();
    drawPlayer();

  } else if (state === 'paused') {
    // Draw everything frozen then overlay
    drawPowerups();
    drawEBullets();
    drawEnemies();
    drawBullets();
    drawParticles();
    drawPlayer();
    drawPause();
  }
}

// Draw initial stars on menu
function menuDraw() {
  ctx.fillStyle = '#000008';
  ctx.fillRect(0, 0, W, H);
  updateStars(16);
  drawStars();
  if (state === 'menu') requestAnimationFrame(menuDraw);
}
requestAnimationFrame(menuDraw);

playBtn.addEventListener('click', startGame);
</script>
